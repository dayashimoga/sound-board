<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Sound Board — Web Audio Synth | QuickUtils</title>
    <script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Sound Board \u2014 Web Audio Synth",
    "url": "https://sounds.quickutils.top/",
    "description": "Premium glassmorphism synthesizer sound board using Web Audio API.",
    "applicationCategory": "BrowserApplication",
    "operatingSystem": "All"
}
</script>
    <link rel="canonical" href="https://sounds.quickutils.top/">
    <meta name="description" content="Premium glassmorphism synthesizer sound board using Web Audio API.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔊</text></svg>">
    <link rel="stylesheet" href="quickutils-core.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar"><div class="container nav-inner">
        <a href="https://quickutils.top" class="brand">🔊 Sound Board Pro</a>
        <div class="nav-links">
            <button id="themeBtn" class="theme-btn">🌙</button>
        </div>
    </div></nav>
    <main class="container">
        <div class="sound-layout">
            <div class="controls-panel glass-panel">
                <h2>Master Controls</h2>
                
                <div class="control-group">
                    <label>Volume <span><span id="volVal">50</span>%</span></label>
                    <input type="range" id="masterVol" min="0" max="100" value="50">
                </div>
                
                <div class="control-group">
                    <label>Base Pitch <span><span id="pitchVal">440</span>Hz</span></label>
                    <input type="range" id="masterPitch" min="100" max="2000" value="440">
                </div>
                
                <div class="control-group">
                    <label>Reverb Mix <span><span id="reverbVal">0</span>%</span></label>
                    <input type="range" id="reverbMix" min="0" max="100" value="0">
                </div>
                
                <div class="control-group" style="margin-bottom:0">
                    <label>BPM <span><span id="bpmVal">120</span></span></label>
                    <input type="range" id="seqBpm" min="60" max="240" value="120">
                </div>

                <div class="action-buttons">
                    <button id="btnRecord">🔴 Record</button>
                    <button id="btnDownloadRec" disabled>📥 WAV</button>
                    <button id="btnSeqPlay">▶ Play</button>
                    <button id="btnSeqStop">⏹ Stop</button>
                </div>

                <canvas id="spectrumCanvas"></canvas>
            </div>
            
            <div>
                <div class="pad-grid">
                    <div class="pad preset-kick" data-type="kick">Drum: Kick <kbd>1</kbd></div>
                    <div class="pad preset-snare" data-type="snare">Drum: Snare <kbd>2</kbd></div>
                    <div class="pad preset-hihat" data-type="hihat">Drum: HiHat <kbd>3</kbd></div>
                    <div class="pad preset-laser" data-type="laser">Sci-Fi: Laser <kbd>Q</kbd></div>
                    <div class="pad preset-jump" data-type="jump">Game: Jump <kbd>W</kbd></div>
                    <div class="pad preset-coin" data-type="coin">Game: Coin <kbd>E</kbd></div>
                    <div class="pad preset-explosion" data-type="explosion">FX: Explode <kbd>A</kbd></div>
                    <div class="pad preset-powerup" data-type="powerup">FX: Powerup <kbd>S</kbd></div>
                    <div class="pad preset-blip" data-type="blip">Synth: Blip <kbd>D</kbd></div>
                </div>

                <div class="glass-panel sequencer-panel">
                    <h3 style="margin-bottom: 1rem; color: #fff;">16-Step Sequencer</h3>
                    <div class="seq-grid" id="sequencerGrid">
                        <!-- JS generated rows -->
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="quickutils-core.js"></script>
    <script src="script.js"></script>
</body>
</html>
